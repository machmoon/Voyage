name: Voyage
options:
  bundleIdPrefix: com.patliu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: false
targets:
  Voyage:
    type: application
    platform: iOS
    sources:
      - path: Voyage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patliu.voyage
        INFOPLIST_FILE: Voyage/Support/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        CODE_SIGN_STYLE: Automatic
        ENABLE_TESTABILITY: true
  VoyageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoyageTests
    dependencies:
      - target: Voyage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patliu.voyage.tests
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
  VoyageUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VoyageUITests
    dependencies:
      - target: Voyage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patliu.voyage.uitests
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
schemes:
  Voyage:
    build:
      targets:
        Voyage: all
        VoyageTests: [test]
        VoyageUITests: [test]
    test:
      targets:
        - VoyageTests
        - VoyageUITests
      gatherCoverageData: false
